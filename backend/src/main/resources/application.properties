spring.application.name=control-pagina
server.port=8080

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/PaginaCod?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASS:admin}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload
file.upload-dir=${FILE_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# SSL
server.ssl.enabled=false
